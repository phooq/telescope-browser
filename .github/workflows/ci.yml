name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libsoup-3.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace

      - name: Check desktop webview shell
        run: cargo check -p telescope-desktop --features webview
